---
- name: Install Docker on Terraform lab server
  hosts: web
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker and Compose plugin
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Create application directory
      ansible.builtin.file:
        path: /opt/cervelliesplosi
        state: directory
        owner: root
        group: root
        mode: "0755"
