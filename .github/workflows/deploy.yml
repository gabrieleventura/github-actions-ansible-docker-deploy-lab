name: Deploy application with Ansible

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner_key
          chmod 600 ~/.ssh/hetzner_key
          ssh-keyscan -H lab.cervelliesplosi.com >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/hetzner_key -o IdentitiesOnly=yes root@lab.cervelliesplosi.com "echo SSH connection successful"

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook -i inventory.ini deploy-app.yml --private-key ~/.ssh/hetzner_key -u root
